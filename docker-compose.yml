services:
  caddy:
    image: caddy:2
    container_name: ceges-honlap-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - cms
    networks:
      - app-network

  frontend:
    image: node:20-alpine
    container_name: ceges-honlap-frontend
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "if [ ! -d node_modules/next ]; then npm install; fi &&
      npm run dev -- -H 0.0.0.0 -p 3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_CMS_URL: ${NEXT_PUBLIC_CMS_URL}
      CMS_INTERNAL_URL: http://cms:3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - cms
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    networks:
      - app-network

  cms:
    image: node:22.17.0-alpine
    container_name: ceges-honlap-cms
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "apk add --no-cache libc6-compat >/dev/null &&
      if [ ! -d node_modules/next ]; then npm install; fi &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:password@postgres:5432/payload}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - postgres
    volumes:
      - ./cms:/app
      - cms_node_modules:/app/node_modules
      - cms_next:/app/.next
    networks:
      - app-network

  postgres:
    image: postgres:16
    container_name: ceges-honlap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payload}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - payload_pg_data:/var/lib/postgresql/data
    networks:
      - app-network


volumes:
  payload_pg_data:
  caddy_data:
  caddy_config:
  frontend_node_modules:
  frontend_next:
  cms_node_modules:
  cms_next:

networks:
  app-network:
    driver: bridge
